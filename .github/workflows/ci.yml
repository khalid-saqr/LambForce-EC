name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: lambforce-ec phase0-check --repository-root .
      - run: pytest
      - run: ruff check src tests
      - run: python -m compileall -q src tests
      - run: python -m build --wheel
      - name: Verify installed wheel outside repository
        run: |
          python -m venv /tmp/lambforce-wheel
          /tmp/lambforce-wheel/bin/pip install --upgrade pip
          /tmp/lambforce-wheel/bin/pip install dist/*.whl
          cd /tmp
          /tmp/lambforce-wheel/bin/lambforce-ec phase0-check
