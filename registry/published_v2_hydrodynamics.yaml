registry_version: 1.0.0-published-v2
source:
  repository: khalid-saqr/picoNewton
  repository_commit_sha: 4c3c36db0578373cc4e48d9d8c7e8a85944ed1cb
  published_notebook_path: picoNewton_v2.ipynb
  published_notebook_blob_sha: 9d61c237cda75df338ce0383038f7765c886f503
  paper_doi: 10.1038/s41598-026-47474-x
  source_role: historical_publication_oracle
  extraction_note: >-
    Artery radii and harmonic amplitudes are cross-checked against Table 1 of the paper. Remaining
    scalar inputs and pressure-gradient scales are preserved by the source-traceable picoNewton v3
    module at the frozen repository commit and must be audited against the exact v2 notebook during
    Phase 1A. Numerical outputs must be regressed against a cold execution of that notebook blob.
fluid:
  density_kg_m3: 1060.0
  kinematic_viscosity_m2_s: 3.5e-6
  fundamental_frequency_hz: 1.2
control_volume:
  reference_area_m2: 1.0e-10
  reference_volume_m3: 1.0e-15
anisotropy:
  beta: 0.1
  gamma: 0.1
  delta: 1.0
  isotropic_beta: 0.0
  isotropic_gamma: 0.0
  isotropic_delta: 1.0
numerical:
  radial_order: 150
  time_points: 2048
  quadrature_nodes: 256
  harmonics_retained: 6
  harmonic_rms_tolerance: 1.0e-3
  verified_nonlinear_ordering: reconstruct_real_fields_then_multiply
  historical_nonlinear_ordering: multiply_corresponding_harmonic_fields_then_reconstruct
